services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MODEL_TIER: ${MODEL_TIER:-free}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      STARTUP_WARM_MODELS: ${STARTUP_WARM_MODELS:-false}
      DATABASE_URL: postgresql://vahanai:${POSTGRES_PASSWORD:-supersecret123}@postgres:5432/vahanai_voice
      REDIS_URL: redis://:${REDIS_PASSWORD:-supersecret123}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: vahanai_voice
      POSTGRES_USER: vahanai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-supersecret123}
    ports:
      - "6379:6379"

  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8001:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command: >
      --model mistralai/Mistral-Small-3.1-24B-Instruct-2503
      --max-model-len 8192
      --dtype float16
      --gpu-memory-utilization 0.92
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["full"]

volumes:
  postgres_data:
  huggingface_cache:
